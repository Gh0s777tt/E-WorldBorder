name: Lint

on:
  push:
    branches: [ master ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# Quality gates run as a separate, non-blocking job (continue-on-error) so they surface style/smell
# feedback in the logs without turning the build red. Flip continue-on-error off to make them enforced.
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: ktlint
        continue-on-error: true
        run: |
          KTLINT_VERSION=1.5.0
          curl -sSLO "https://github.com/pinterest/ktlint/releases/download/${KTLINT_VERSION}/ktlint"
          chmod +x ktlint
          ./ktlint "src/**/*.kt"

      - name: detekt
        continue-on-error: true
        run: |
          DETEKT_VERSION=1.23.7
          curl -sSLO "https://github.com/detekt/detekt/releases/download/v${DETEKT_VERSION}/detekt-cli-${DETEKT_VERSION}-all.jar"
          java -jar "detekt-cli-${DETEKT_VERSION}-all.jar" --input src/main/kotlin --build-upon-default-config
