version: 2
updates:
  - package-ecosystem: gradle
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    ignore:
      # paper-api uses MC-version snapshot versioning that Dependabot misreads; bump it by hand
      # together with the target Minecraft version instead.
      - dependency-name: "io.papermc.paper:paper-api"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
